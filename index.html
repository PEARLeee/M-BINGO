<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>무민 팝업 빙고</title>
  <meta name="description" content="무민 팝업스토어 사진 인증 빙고" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #EFF6F4;
      --surface: #FFFFFF;
      --border: #D9E6E2;
      --accent: #3B7A6B;
      --accent-light: #E1F0EA;
      --accent-mid: #9FCBBC;
      --text-primary: #1C2624;
      --text-secondary: #6B7C77;
      --text-hint: #A3B0AC;
      --radius-sm: 10px;
      --radius-md: 16px;
      --radius-lg: 22px;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 0 0 80px;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 22px 20px 18px;
      position: sticky; top: 0; z-index: 10;
    }
    .header-inner { max-width: 480px; margin: 0 auto; }
    .header-eyebrow {
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
      color: var(--accent); text-transform: uppercase; margin-bottom: 5px;
    }
    .header-title { font-size: 21px; font-weight: 900; color: var(--text-primary); }
    .header-sub { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }

    .main { max-width: 480px; margin: 0 auto; padding: 22px 16px; }

    /* Progress */
    .progress-card {
      background: var(--surface);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      padding: 18px 20px;
      margin-bottom: 18px;
    }
    .progress-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
    .progress-label { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
    .progress-count { font-size: 15px; font-weight: 700; color: var(--accent); }
    .progress-dots { display: flex; gap: 8px; }
    .progress-dot {
      flex: 1; height: 10px; border-radius: 99px;
      background: var(--bg); transition: background 0.3s;
    }
    .progress-dot.filled { background: var(--accent); }

    /* Bingo banner */
    .bingo-banner {
      display: none;
      background: var(--accent);
      border-radius: var(--radius-md);
      padding: 18px 20px;
      margin-bottom: 18px;
      text-align: center;
      color: white;
    }
    .bingo-banner.show { display: block; }
    .bingo-banner-title { font-size: 17px; font-weight: 900; }
    .bingo-banner-sub { font-size: 13px; opacity: 0.9; margin-top: 3px; }
    .bingo-banner-code {
      margin-top: 12px; padding: 10px;
      background: rgba(255,255,255,0.15);
      border-radius: var(--radius-sm);
      font-size: 12px; line-height: 1.5;
    }
    .bingo-banner-code b { font-size: 14px; letter-spacing: 0.05em; }

    /* Grid - single row of 3 */
    .bingo-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .cell {
      aspect-ratio: 0.85;
      border-radius: var(--radius-md);
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 12px 8px;
      cursor: pointer; position: relative; overflow: hidden;
      transition: transform 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .cell:active { transform: scale(0.96); }
    .cell.verified { border-color: var(--accent); background: var(--accent-light); }

    .cell-photo {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.3;
    }

    .cell-body { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .cell-num {
      font-size: 11px; font-weight: 700; color: var(--text-hint);
    }
    .cell.verified .cell-num { color: var(--accent); }
    .cell-emoji { font-size: 28px; line-height: 1; }
    .cell-label {
      font-size: 11.5px; font-weight: 500;
      color: var(--text-primary); line-height: 1.45;
    }
    .cell.verified .cell-label { color: #1F4438; }

    .cell-check {
      display: none;
      position: absolute; top: 7px; right: 7px; z-index: 2;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--accent);
      align-items: center; justify-content: center;
    }
    .cell.verified .cell-check { display: flex; }

    /* Staff verify section */
    .staff-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 18px 20px;
      margin-bottom: 16px;
    }
    .staff-title { font-size: 13px; font-weight: 700; color: var(--text-secondary); margin-bottom: 4px; }
    .staff-hint { font-size: 12px; color: var(--text-hint); margin-bottom: 14px; line-height: 1.5; }
    .staff-btn {
      width: 100%; padding: 15px;
      background: var(--accent); border: none;
      border-radius: var(--radius-sm);
      font-family: inherit; font-size: 14.5px; font-weight: 700;
      color: white; cursor: pointer;
    }
    .staff-btn:disabled { background: var(--border); color: var(--text-hint); cursor: not-allowed; }
    .staff-btn.used { background: #B8C4C0; }

    .reset-btn {
      width: 100%; padding: 13px; margin-top: 10px;
      background: transparent; border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: inherit; font-size: 13px; font-weight: 500;
      color: var(--text-hint); cursor: pointer;
    }

    /* Modal (photo) */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: rgba(10,15,13,0.55);
      align-items: flex-end; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      padding: 24px 20px 40px;
      width: 100%; max-width: 480px;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 99px; margin: 0 auto 20px; }
    .modal-mission { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
    .modal-hint { font-size: 13px; color: var(--text-secondary); margin-bottom: 18px; }

    .photo-area {
      width: 100%; aspect-ratio: 4/3;
      border-radius: var(--radius-md);
      border: 1.5px dashed var(--border);
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; cursor: pointer; overflow: hidden;
      margin-bottom: 16px; position: relative;
    }
    .photo-area img { width: 100%; height: 100%; object-fit: cover; }
    .photo-placeholder { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .photo-placeholder span { font-size: 13px; color: var(--text-hint); }

    .modal-actions { display: flex; gap: 10px; }
    .btn-cancel {
      flex: 1; padding: 14px; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; font-weight: 500;
      color: var(--text-secondary); cursor: pointer;
    }
    .btn-confirm {
      flex: 2; padding: 14px; background: var(--accent); border: none;
      border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; font-weight: 700;
      color: white; cursor: pointer; transition: opacity 0.15s;
    }
    .btn-confirm:disabled { opacity: 0.35; cursor: not-allowed; }
    input[type=file] { display: none; }

    .uploading { text-align: center; font-size: 13px; color: var(--text-hint); padding: 10px; }

    /* Staff PIN modal */
    .pin-modal { max-width: 320px; padding: 28px 24px; border-radius: var(--radius-md); text-align: center; }
    .pin-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
    .pin-input {
      width: 100%; padding: 14px; font-size: 18px; text-align: center;
      letter-spacing: 0.3em; border: 1px solid var(--border); border-radius: var(--radius-sm);
      margin-bottom: 14px; font-family: inherit;
    }
    .pin-error { font-size: 12px; color: #C0392B; margin-bottom: 10px; min-height: 16px; }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <p class="header-eyebrow">Moomin Pop-up</p>
    <h1 class="header-title">무민 팝업 빙고</h1>
    <p class="header-sub">3칸을 모두 채우고 직원에게 보여주세요!</p>
  </div>
</header>

<main class="main">

  <div class="progress-card">
    <div class="progress-top">
      <span class="progress-label">인증 완료</span>
      <span class="progress-count"><span id="done-count">0</span> / 3</span>
    </div>
    <div class="progress-dots">
      <div class="progress-dot" id="dot-0"></div>
      <div class="progress-dot" id="dot-1"></div>
      <div class="progress-dot" id="dot-2"></div>
    </div>
  </div>

  <div class="bingo-banner" id="bingo-banner">
    <p class="bingo-banner-title">🎉 한 줄 빙고 완성!</p>
    <p class="bingo-banner-sub">직원에게 화면을 보여주고 GWP를 받아보세요</p>
  </div>

  <div class="bingo-row" id="bingo-row"></div>

  <div class="staff-section">
    <p class="staff-title">직원 확인용</p>
    <p class="staff-hint">손님이 3칸을 모두 채운 것을 확인한 후, 직원이 직접 눌러주세요. GWP는 1회만 지급됩니다.</p>
    <button class="staff-btn" id="staff-verify-btn" disabled onclick="onStaffBtnClick()">GWP 지급 확인</button>
  </div>

  <button class="reset-btn" onclick="resetAll()">처음부터 다시</button>

</main>

<!-- Photo Modal -->
<div class="modal-backdrop" id="modal-backdrop" onclick="handleBackdropClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <p class="modal-mission" id="modal-mission"></p>
    <p class="modal-hint">사진을 찍거나 갤러리에서 선택해 인증하세요</p>
    <div class="photo-area" id="photo-area" onclick="document.getElementById('file-input').click()">
      <div class="photo-placeholder" id="photo-placeholder">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <span>탭해서 사진 선택 / 촬영</span>
      </div>
      <img id="photo-preview" src="" alt="인증 사진" style="display:none" />
    </div>
    <input type="file" id="file-input" accept="image/*" capture="environment" onchange="onFileSelect(event)" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-confirm" id="btn-confirm" disabled onclick="confirmVerify()">인증 완료</button>
    </div>
    <p class="uploading" id="uploading-msg" style="display:none">업로드 중...</p>
  </div>
</div>

<!-- Staff PIN Modal -->
<div class="modal-backdrop" id="pin-backdrop" onclick="handlePinBackdropClick(event)">
  <div class="modal pin-modal">
    <p class="pin-title">직원 PIN 입력</p>
    <input type="password" inputmode="numeric" maxlength="4" class="pin-input" id="pin-input" placeholder="••••" />
    <p class="pin-error" id="pin-error"></p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closePinModal()">취소</button>
      <button class="btn-confirm" onclick="submitPin()">확인 및 지급</button>
    </div>
  </div>
</div>


<!-- Already Redeemed Modal -->
<div class="modal-backdrop" id="already-backdrop" onclick="closeAlreadyModal()">
  <div class="modal" style="text-align:center; padding: 36px 24px 40px;">
    <div style="font-size:40px; margin-bottom:14px;">🙅</div>
    <p style="font-size:17px; font-weight:900; margin-bottom:8px; color:var(--text-primary);">이미 참여가 완료된 고객이에요!</p>
    <p style="font-size:13px; color:var(--text-secondary); margin-bottom:24px; line-height:1.6;">GWP는 1인 1회만 지급됩니다.<br/>이미 지급이 완료된 고객이에요.</p>
    <button class="btn-confirm" style="width:100%;" onclick="closeAlreadyModal()">확인</button>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, doc, setDoc, getDoc, collection, addDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ⚠️ 아래 firebaseConfig 값을 본인 Firebase 프로젝트 설정으로 교체하세요
  const firebaseConfig = {
    apiKey: "AIzaSyA_zpPixyI-Hp6hpuw2Uq7Y4Q5Qvj_l6SI",
    authDomain: "moomin-ssg.firebaseapp.com",
    projectId: "moomin-ssg",
    storageBucket: "moomin-ssg.firebasestorage.app",
    messagingSenderId: "366062905753",
    appId: "1:366062905753:web:54bcb491eba940ec980b08"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 직원 PIN (관리자 페이지에서 변경 가능하도록 추후 확장 가능)
  const STAFF_PIN = "1234";

  // 이 기기/손님의 고유 세션 ID (참여 코드로도 사용)
  function getSessionId() {
    let id = localStorage.getItem('moomin-bingo-session');
    if (!id) {
      id = 'M' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2, 6).toUpperCase();
      localStorage.setItem('moomin-bingo-session', id);
    }
    return id;
  }

  const CELLS = [
    { emoji: "💧", text: "비밀의 주문 우물에서 사진 촬영!" },
    { emoji: "🪧", text: "에피소드 팻말 촬영" },
    { emoji: "🤳", text: "무민과 셀피" }
  ];

  const sessionId = getSessionId();
  let photos = JSON.parse(localStorage.getItem('moomin-bingo-photos') || 'null') || Array(3).fill(null);
  let redeemed = localStorage.getItem('moomin-bingo-redeemed') === 'true';
  let activeIdx = null;
  let pendingDataUrl = null;
  let pendingMime = null;

  function saveLocal() {
    try {
      localStorage.setItem('moomin-bingo-photos', JSON.stringify(photos));
      localStorage.setItem('moomin-bingo-redeemed', redeemed ? 'true' : 'false');
    } catch(e) {}
  }

  function allFilled() {
    return photos.every(p => p);
  }

  async function logVisit() {
    try {
      const visitRef = doc(db, 'sessions', sessionId);
      await setDoc(visitRef, {
        sessionId,
        lastSeen: serverTimestamp(),
        cellsCompleted: photos.filter(Boolean).length,
        redeemed
      }, { merge: true });
      await addDoc(collection(db, 'pageviews'), {
        sessionId,
        timestamp: serverTimestamp(),
        userAgent: navigator.userAgent
      });
    } catch(e) { console.warn('Firebase log failed', e); }
  }

  async function savePhotoToFirestore(idx, dataUrl) {
    try {
      const cellRef = doc(db, 'sessions', sessionId, 'cells', String(idx));
      await setDoc(cellRef, {
        cellIndex: idx,
        missionText: CELLS[idx].text,
        photoDataUrl: dataUrl, // 데모용: 실제 운영시엔 Storage 업로드 후 URL 저장 권장
        verifiedAt: serverTimestamp()
      });
      const sessionRef = doc(db, 'sessions', sessionId);
      await setDoc(sessionRef, {
        sessionId,
        cellsCompleted: photos.filter(Boolean).length,
        lastUpdated: serverTimestamp(),
        allCompleted: allFilled(),
        redeemed
      }, { merge: true });
    } catch(e) {
      console.warn('Firebase save failed', e);
    }
  }

  async function markRedeemed() {
    try {
      const sessionRef = doc(db, 'sessions', sessionId);
      await setDoc(sessionRef, {
        sessionId,
        redeemed: true,
        redeemedAt: serverTimestamp(),
        cellsCompleted: 3,
        allCompleted: true
      }, { merge: true });
    } catch(e) {
      console.warn('Firebase redeem save failed', e);
    }
  }

  async function checkAlreadyRedeemed() {
    try {
      const sessionRef = doc(db, 'sessions', sessionId);
      const snap = await getDoc(sessionRef);
      if (snap.exists() && snap.data().redeemed) {
        redeemed = true;
        saveLocal();
      }
    } catch(e) { console.warn(e); }
  }

  function render() {
    const row = document.getElementById('bingo-row');
    row.innerHTML = '';

    CELLS.forEach((c, i) => {
      const div = document.createElement('div');
      div.className = 'cell' + (photos[i] ? ' verified' : '');
      div.setAttribute('role', 'button');
      div.setAttribute('aria-label', c.text + (photos[i] ? ' (인증됨)' : ''));
      div.onclick = () => openModal(i);

      let html = '';
      if (photos[i]) {
        html += `<img class="cell-photo" src="${photos[i]}" alt="" />`;
        html += `<div class="cell-check"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"/></svg></div>`;
      }
      html += `<div class="cell-body">
        <span class="cell-num">${i+1}</span>
        <span class="cell-emoji">${c.emoji}</span>
        <span class="cell-label">${c.text}</span>
      </div>`;
      div.innerHTML = html;
      row.appendChild(div);
    });

    const cnt = photos.filter(Boolean).length;
    document.getElementById('done-count').textContent = cnt;
    for (let i = 0; i < 3; i++) {
      document.getElementById('dot-' + i).classList.toggle('filled', i < cnt);
    }

    const banner = document.getElementById('bingo-banner');
    const staffBtn = document.getElementById('staff-verify-btn');

    if (allFilled()) {
      banner.classList.add('show');
      staffBtn.disabled = false;
      staffBtn.textContent = redeemed ? '✓ GWP 지급 완료' : 'GWP 지급 확인';
      staffBtn.classList.toggle('used', redeemed);
    } else {
      banner.classList.remove('show');
      staffBtn.disabled = true;
      staffBtn.textContent = 'GWP 지급 확인';
    }
  }

  function openModal(idx) {
    activeIdx = idx;
    pendingDataUrl = null;
    document.getElementById('modal-mission').textContent = CELLS[idx].text;

    const preview = document.getElementById('photo-preview');
    const placeholder = document.getElementById('photo-placeholder');
    const confirmBtn = document.getElementById('btn-confirm');
    document.getElementById('file-input').value = '';
    document.getElementById('uploading-msg').style.display = 'none';

    if (photos[idx]) {
      preview.src = photos[idx];
      preview.style.display = 'block';
      placeholder.style.display = 'none';
      confirmBtn.disabled = false;
      pendingDataUrl = photos[idx];
    } else {
      preview.style.display = 'none';
      placeholder.style.display = 'flex';
      confirmBtn.disabled = true;
    }

    document.getElementById('modal-backdrop').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-backdrop').classList.remove('open');
    activeIdx = null;
    pendingDataUrl = null;
  }
  window.closeModal = closeModal;

  function handleBackdropClick(e) {
    if (e.target === document.getElementById('modal-backdrop')) closeModal();
  }
  window.handleBackdropClick = handleBackdropClick;

  function onFileSelect(e) {
    const file = e.target.files[0];
    if (!file) return;
    pendingMime = file.type;
    const reader = new FileReader();
    reader.onload = ev => {
      pendingDataUrl = ev.target.result;
      const preview = document.getElementById('photo-preview');
      preview.src = pendingDataUrl;
      preview.style.display = 'block';
      document.getElementById('photo-placeholder').style.display = 'none';
      document.getElementById('btn-confirm').disabled = false;
    };
    reader.readAsDataURL(file);
  }
  window.onFileSelect = onFileSelect;

  async function confirmVerify() {
    if (activeIdx === null || !pendingDataUrl) return;
    document.getElementById('uploading-msg').style.display = 'block';
    document.getElementById('btn-confirm').disabled = true;

    photos[activeIdx] = pendingDataUrl;
    saveLocal();
    await savePhotoToFirestore(activeIdx, pendingDataUrl);

    closeModal();
    render();
  }
  window.confirmVerify = confirmVerify;

  // 직원 버튼 클릭 - 이미 인증된 경우 알림, 아니면 PIN 입력
  function onStaffBtnClick() {
    if (redeemed) {
      document.getElementById('already-backdrop').classList.add('open');
      return;
    }
    openPinModal();
  }
  window.onStaffBtnClick = onStaffBtnClick;

  function closeAlreadyModal() {
    document.getElementById('already-backdrop').classList.remove('open');
  }
  window.closeAlreadyModal = closeAlreadyModal;

  function resetAll() {
    if (!confirm('처음부터 다시 시작할까요? 내 기기의 사진이 초기화됩니다.')) return;
    photos = Array(3).fill(null);
    redeemed = false;
    saveLocal();
    render();
  }
  window.resetAll = resetAll;

  // Staff PIN modal
  function openPinModal() {
    if (!allFilled() || redeemed) return;
    document.getElementById('pin-input').value = '';
    document.getElementById('pin-error').textContent = '';
    document.getElementById('pin-backdrop').classList.add('open');
    setTimeout(() => document.getElementById('pin-input').focus(), 100);
  }
  window.openPinModal = openPinModal;

  function closePinModal() {
    document.getElementById('pin-backdrop').classList.remove('open');
  }
  window.closePinModal = closePinModal;

  function handlePinBackdropClick(e) {
    if (e.target === document.getElementById('pin-backdrop')) closePinModal();
  }
  window.handlePinBackdropClick = handlePinBackdropClick;

  async function submitPin() {
    const val = document.getElementById('pin-input').value;
    if (val !== STAFF_PIN) {
      document.getElementById('pin-error').textContent = 'PIN이 올바르지 않습니다';
      return;
    }
    // double-check against server to prevent double redemption
    await checkAlreadyRedeemed();
    if (redeemed) {
      document.getElementById('pin-error').textContent = '이미 지급된 GWP입니다';
      closePinModal();
      render();
      return;
    }
    redeemed = true;
    saveLocal();
    await markRedeemed();
    closePinModal();
    render();
  }
  window.submitPin = submitPin;

  // init
  checkAlreadyRedeemed().then(render);
  logVisit();
</script>
</body>
</html>
